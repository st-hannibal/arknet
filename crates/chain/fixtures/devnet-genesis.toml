# arknet devnet genesis (Phase 1).
#
# Fair-launch invariant: initial_accounts is intentionally absent.
# The chain starts with total_supply = 0; all ARK is minted post-genesis
# against verified inference work.
#
# The four validators are placeholder Ed25519 pubkeys; replace before any
# real devnet run.

chain_id = "arknet-devnet-1"
initial_height = 0
initial_timestamp_ms = 1_700_000_000_000

