name: Release

# Trigger on version tags OR manually from the Actions tab (for testing).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build everything but skip actual publishing'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build + test gate ──────────────────────────────────────────────
  check:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0
          components: clippy, rustfmt
      # Free disk for RocksDB + llama.cpp compilation
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /usr/local/share/powershell /usr/share/swift \
            /usr/local/.ghcup 2>/dev/null || true
          sudo apt-get clean
      - run: cargo fmt --all -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  # ── Rust SDK → crates.io ───────────────────────────────────────────
  publish-rust:
    name: Publish Rust SDK (crates.io)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /usr/local/share/powershell /usr/share/swift \
            /usr/local/.ghcup 2>/dev/null || true
          sudo apt-get clean
      - name: Publish arknet-common
        if: ${{ github.event_name == 'push' || inputs.dry_run == 'false' }}
        run: cargo publish -p arknet-common --allow-dirty || echo "already published — skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      - name: Publish arknet-crypto
        if: ${{ github.event_name == 'push' || inputs.dry_run == 'false' }}
        run: |
          sleep 15  # wait for crates.io index to update
          cargo publish -p arknet-crypto --allow-dirty || echo "already published — skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      - name: Publish arknet-sdk
        if: ${{ github.event_name == 'push' || inputs.dry_run == 'false' }}
        run: |
          sleep 15
          cargo publish -p arknet-sdk --allow-dirty || echo "already published — skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      - name: Dry run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        run: |
          echo "Dry run — skipping crates.io publish"
          cargo package -p arknet-sdk --allow-dirty
          echo "Package built successfully"

  # ── Python SDK → PyPI ──────────────────────────────────────────────
  publish-python:
    name: Publish Python SDK (PyPI)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        working-directory: bindings/python
        run: |
          pip install build
          python -m build
      - name: Publish
        if: ${{ github.event_name == 'push' || inputs.dry_run == 'false' }}
        working-directory: bindings/python
        run: |
          pip install twine
          twine upload dist/* || echo "already published — skipping"
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      - name: Dry run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        working-directory: bindings/python
        run: |
          echo "Dry run — skipping PyPI upload"
          ls -la dist/

  # ── TypeScript SDK → npm ───────────────────────────────────────────
  publish-npm:
    name: Publish TypeScript SDK (npm)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Install + build
        working-directory: bindings/typescript
        run: |
          npm install
          npm run build
      - name: Publish
        if: ${{ github.event_name == 'push' || inputs.dry_run == 'false' }}
        working-directory: bindings/typescript
        run: npm publish || echo "already published — skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Dry run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        working-directory: bindings/typescript
        run: |
          echo "Dry run — skipping npm publish"
          npm pack
          ls -la *.tgz

  # ── Release binary ─────────────────────────────────────────────────
  release-binary:
    name: Build release binary (${{ matrix.target }})
    needs: check
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: arknet-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: arknet-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /usr/local/share/powershell /usr/share/swift \
            /usr/local/.ghcup 2>/dev/null || true
          sudo apt-get clean
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/arknet release/${{ matrix.artifact }}
          chmod +x release/${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}

  # ── GitHub Release ─────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [release-binary, publish-rust, publish-python, publish-npm]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            artifacts/arknet-linux-amd64/arknet-linux-amd64 \
            artifacts/arknet-macos-arm64/arknet-macos-arm64
