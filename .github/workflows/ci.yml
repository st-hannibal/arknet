name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build deps (cmake, clang)
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Free disk space (linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /
      - name: Free disk space (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "C:\hostedtoolcache\CodeQL" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache\Java_Temurin-Hotspot_jdk" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\dotnet\sdk" -ErrorAction SilentlyContinue
          Get-PSDrive C | Select-Object Used, Free
      - name: Install cmake (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      # macOS ships with cmake on GitHub runners. Windows ships Chocolatey
      # and VS 2022; we install cmake via chocolatey to be version-stable.
      - name: Install cmake (windows)
        if: runner.os == 'Windows'
        run: choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System'
        shell: pwsh
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets
      # Pre-fetch the stories260K test fixture exactly once per runner.
      # Three parallel inference tests call the same fallback curl path
      # and race on the download file — deterministic on POSIX (fast
      # writes hide the race), flaky on Windows. Doing it here makes
      # the tests hit the already-present-file branch.
      - name: Fetch test fixtures (posix)
        if: runner.os != 'Windows'
        id: fixture_posix
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/arknet-test-fixtures"
          curl -sSL --fail \
            -o "${RUNNER_TEMP}/arknet-test-fixtures/stories260K.gguf" \
            https://huggingface.co/ggml-org/models/resolve/main/tinyllamas/stories260K.gguf
          echo "path=${RUNNER_TEMP}/arknet-test-fixtures/stories260K.gguf" >> "${GITHUB_OUTPUT}"
      - name: Fetch test fixtures (windows)
        if: runner.os == 'Windows'
        id: fixture_windows
        shell: pwsh
        run: |
          $dir = Join-Path $env:RUNNER_TEMP 'arknet-test-fixtures'
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $dest = Join-Path $dir 'stories260K.gguf'
          Invoke-WebRequest `
            -Uri 'https://huggingface.co/ggml-org/models/resolve/main/tinyllamas/stories260K.gguf' `
            -OutFile $dest
          "path=$dest" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
      # `STORIES260K_FIXTURE_PATH` is deliberately NOT `ARKNET_*`-prefixed:
      # the common crate's figment loader reads every `ARKNET_*` env var
      # with `deny_unknown_fields`, so test-scoped env vars under that
      # prefix would break `NodeConfig::load` mid-test.
      - name: Test
        env:
          STORIES260K_FIXTURE_PATH: ${{ steps.fixture_posix.outputs.path || steps.fixture_windows.outputs.path }}
        run: cargo test --workspace --all-features

  audit:
    name: security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run audit
        run: cargo audit

  deny:
    name: license & advisory check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.86.0"
